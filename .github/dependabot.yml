version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Batch low-risk dev/test tooling into one PR to cut noise.
      dev-tooling:
        patterns:
          - "@biomejs/*"
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "@testing-library/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
