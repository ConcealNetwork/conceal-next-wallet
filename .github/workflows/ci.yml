name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege by default; jobs elevate only what they need.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run types
      - name: Lint (Biome)
        run: npm run lint
      - name: Unit tests
        run: npm test

  build:
    name: Build (static export)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (static export, real wallet)
        # Built at root (no base path) so the artifact is servable at "/" for
        # bundle-size + Lighthouse. Prod subpath build is validated by deploy.yml.
        run: npm run build
        env:
          NEXT_PUBLIC_USE_MOCK: "false"
      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx > sbom.cyclonedx.json
      - name: Upload static export
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-export
          path: out
          retention-days: 7
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 30

  e2e:
    name: E2E (Playwright, mock mode)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      # Use the gitleaks CLI directly (MIT, free). The gitleaks-action wrapper
      # requires a paid GITLEAKS_LICENSE for organization-owned repos.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          # Content-pin the release artifact (verify before extract+exec).
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          curl -sSfLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | sha256sum -c -
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
          ./gitleaks version
      - name: Run gitleaks
        run: ./gitleaks git --no-banner --redact --verbose

  dependency-review:
    name: Dependency review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: high
          # Block strong copyleft (incompatible with the repo's BSD-3-Clause
          # distribution); deny-list avoids false positives on obscure permissive licenses.
          # LGPL-3.0 is intentionally allowed: Next.js pulls `sharp` → `@img/sharp-libvips-*`
          # (LGPL-3.0-or-later). sharp dynamically links those prebuilt binaries at
          # build/install time and does not ship them in the static wallet export
          # (see lovell/sharp#3565). Re-deny if a runtime-bundled LGPL dep appears.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0, SSPL-1.0
          comment-summary-in-pr: on-failure

  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: actionlint
        uses: raven-actions/actionlint@v2.2.0

  commitlint:
    name: Commit messages (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: commitlint
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1

  audit:
    name: Dependency audit (informational)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  bundle-size:
    name: Bundle size (informational)
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download static export
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-export
          path: out
      - name: Report bundle size
        run: |
          {
            echo "### Static export size"
            echo ""
            echo "Total \`out/\`: $(du -sh out | cut -f1)"
            echo ""
            echo "Largest JS chunks:"
            echo '```'
            find out -name '*.js' -printf '%s\t%p\n' | sort -rn | head -10 \
              | awk '{ printf "%8.1f KB  %s\n", $1/1024, $2 }'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          big=$(find out -name '*.js' -size +600k | head -1 || true)
          if [ -n "$big" ]; then echo "::warning::Large JS chunk (>600KB): $big"; fi

  lighthouse:
    name: Lighthouse (perf + a11y, informational)
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Download static export
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-export
          path: out
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.15.1 autorun || true

  ci-complete:
    name: CI gate
    # Always runs; inspects upstream results. Branch protection should require
    # ONLY this check. Conditional jobs (PR-only) may legitimately skip on push.
    if: always()
    needs:
      - quality
      - build
      - e2e
      - secret-scan
      - dependency-review
      - actionlint
      - commitlint
      - audit
      - bundle-size
      - lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate upstream results
        run: |
          echo "=== CI gate results ==="
          # Must succeed — failure or cancellation fails the gate.
          REQUIRED=(quality build e2e secret-scan actionlint)
          # PR-only jobs — skip is OK (push to main), only failure/cancel blocks.
          CONDITIONAL=(dependency-review commitlint)
          # Soft (continue-on-error) — logged, never block.
          SOFT=(audit bundle-size lighthouse)
          FAILED=0

          declare -A R=(
            [quality]="${{ needs.quality.result }}"
            [build]="${{ needs.build.result }}"
            [e2e]="${{ needs.e2e.result }}"
            [secret-scan]="${{ needs.secret-scan.result }}"
            [actionlint]="${{ needs.actionlint.result }}"
            [dependency-review]="${{ needs.dependency-review.result }}"
            [commitlint]="${{ needs.commitlint.result }}"
            [audit]="${{ needs.audit.result }}"
            [bundle-size]="${{ needs.bundle-size.result }}"
            [lighthouse]="${{ needs.lighthouse.result }}"
          )

          for job in "${REQUIRED[@]}"; do
            if [ "${R[$job]}" != "success" ]; then
              echo "❌ REQUIRED $job: ${R[$job]}"; FAILED=1
            else echo "✅ $job: ${R[$job]}"; fi
          done
          for job in "${CONDITIONAL[@]}"; do
            if [ "${R[$job]}" = "failure" ] || [ "${R[$job]}" = "cancelled" ]; then
              echo "❌ CONDITIONAL $job: ${R[$job]}"; FAILED=1
            else echo "✅ $job: ${R[$job]} (skip OK)"; fi
          done
          for job in "${SOFT[@]}"; do
            echo "ℹ️  $job: ${R[$job]} (non-blocking)"
          done

          if [ "$FAILED" = "1" ]; then
            echo "CI gate failed."; exit 1
          fi
          echo "CI gate passed."
