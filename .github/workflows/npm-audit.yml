name: npm audit

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        continue-on-error: true
        run: npm audit --audit-level=none

      - name: Typecheck
        continue-on-error: true
        run: npm run types

      - name: Biome
        continue-on-error: true
        run: npm run lint -- --reporter=github
